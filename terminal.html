<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:#000; overflow:hidden; }

  body::before {
    content:""; position:fixed; inset:0; z-index:2; pointer-events:none;
    background:repeating-linear-gradient(0deg,

    mix-blend-mode:overlay;
  }

  body::after {
    content:""; position:fixed; inset:-50%; z-index:2; pointer-events:none;
    width:200%; height:200%;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    opacity:0.18; animation:grain 0.12s steps(1) infinite;
  }

  @keyframes grain {
    0%  { transform:translate(0,0);    } 10% { transform:translate(-3%,-4%); }
    20% { transform:translate(-6%,3%); } 30% { transform:translate(4%,-2%);  }
    40% { transform:translate(-2%,6%); } 50% { transform:translate(-5%,-3%); }
    60% { transform:translate(3%,5%);  } 70% { transform:translate(6%,-4%);  }
    80% { transform:translate(-4%,2%); } 90% { transform:translate(2%,-6%);  }
    100%{ transform:translate(-3%,4%); }
  }

  #iridescent {
    position:fixed; inset:-6%; width:112%; height:112%;
    z-index:90; pointer-events:none;
    mix-blend-mode:screen; opacity:0.12;
    background:conic-gradient(
      from 0deg at 50% 50%,
      rgba(255,0,60,0.75),
      rgba(232,115,42,0.65),
      rgba(0,255,0,0.55),
      rgba(0,234,255,0.65),
      rgba(255,0,60,0.75)
    );
    will-change:opacity, background, transform;
    transition:opacity 0.4s ease;
  }

  #page {
    position: relative;
    height: 100vh;
    height: 100dvh;
    display: flex; flex-direction: column;
    padding: 24px 40px 24px;
  }

  /* Transparent background box — matches rules page content style */
  #terminal-box {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(10, 12, 15, 0.88);
    border: 1px solid rgba(238, 240, 245, 0.08);
    min-height: 0;
    overflow: hidden;
    will-change: transform;
    transform-origin: center center;
  }

  #t-output {
    flex: 1; overflow-y: auto;
    padding: 24px 28px 0;
    display: flex; flex-direction: column; justify-content: flex-start;
    scrollbar-width: thin;
    scrollbar-color: rgba(238,240,245,0.08) transparent;
  }

  @media (max-width: 768px) {
    #page { padding: 12px 16px 12px; }
    .t-line { font-size: 12px; }
    #t-input-row { padding: 16px 16px 16px; }
  }

  .t-line {
    font-family:'Share Tech Mono', monospace;
    font-size:13px; line-height:1.9; letter-spacing:0.04em;
    white-space:pre-wrap; min-height:1.9em;
  }
  .t-line.dim    { color:rgba(79,195,247,0.70); }
  .t-line.lo     { color:rgba(79,195,247,0.40); }
  .t-line.full   { color:#4fc3f7; }
  .t-line.warn   { color:#E8732A; }
  .t-line.denied { color:#ff003c; }
  .t-line.user   { color:rgba(238,240,245,0.50); }
  .t-line.blank  { color:transparent; min-height:1.9em; }

  @keyframes tBlink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .t-cursor::after {
    content:'_'; animation:tBlink 0.9s step-end infinite; color:#4fc3f7;
  }

  #t-input-row {
    display: flex; align-items: center;
    padding: 24px 28px 24px; flex-shrink: 0;
    border-top: 1px solid rgba(238,240,245,0.05);
  }
  #t-prompt {
    font-family:'Share Tech Mono', monospace;
    font-size:13px; color:#4fc3f7; user-select:none;
  }
  #t-field {
    flex:1; background:transparent; border:none; outline:none;
    font-family:'Share Tech Mono', monospace;
    font-size:13px; color:#4fc3f7;
    letter-spacing:0.04em; caret-color:#4fc3f7;
    text-transform:uppercase;
  }
</style>

// ── VARIANT PICKER ────────────────────────────────────────────────────────────
function pickVariant(egg) {
  if (egg.variants) {
    if (egg.weighted) {
      // Handle weighted variants (last variant has weight property)
      var last = egg.variants[egg.variants.length - 1];
      if (last.weight && Math.random() < last.weight) return last;
      var pool = egg.variants.slice(0, egg.variants.length - 1);
      return pool[Math.floor(Math.random() * pool.length)];
    }
    return egg.variants[Math.floor(Math.random() * egg.variants.length)];
  }
  return { lines: egg.lines, cls: egg.cls };
}

function checkEasterEgg(input) {
  var lower = input.toLowerCase();
  for (var i = 0; i < EASTER_EGGS.length; i++) {
    var egg = EASTER_EGGS[i];
    for (var j = 0; j < egg.keys.length; j++) {
      if (lower.includes(egg.keys[j])) return egg;
    }
  }
  return null;
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
var audioCtx   = null;
var ambientOsc = null;
var ambientGn  = null;
var lastInput  = Date.now();
var idleTimer  = null;
var VOL        = 0.18;

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume().then(function() { startAmbient(); scheduleIdle(); });
  }
  return audioCtx;
}
function startAmbient() {
  if (ambientOsc) return;
  try {
    ambientOsc = audioCtx.createOscillator();
    ambientOsc.type = 'sine';
    ambientOsc.frequency.value = 42;
    ambientGn = audioCtx.createGain();
    ambientGn.gain.value = 0.04;
    ambientOsc.connect(ambientGn);
    ambientGn.connect(audioCtx.destination);
    ambientOsc.start();
  } catch(e) {}
}
function scheduleIdle() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(function() {
    if (Date.now() - lastInput > 15000) playIdlePop();
    scheduleIdle();
  }, 15000);
}
function playIdlePop() {
  try {
    var ctx = getCtx();
    var len = Math.floor(ctx.sampleRate * 0.06);
    var buf = ctx.createBuffer(1, len, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < len; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(len*0.3));
    var src = ctx.createBufferSource(); src.buffer = buf;
    var flt = ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=1200; flt.Q.value=0.5;
    var gn = ctx.createGain();
    gn.gain.setValueAtTime(VOL*0.35, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.06);
    src.connect(flt); flt.connect(gn); gn.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime+0.06);
  } catch(e) {}
}

    for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
    var src = ctx.createBufferSource(); src.buffer = buf;
    var flt = ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=3000+Math.random()*1000; flt.Q.value=0.8;
    var gn = ctx.createGain();
    gn.gain.setValueAtTime(VOL, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    src.connect(flt); flt.connect(gn); gn.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime+dur);
  } catch(e) {}
}
function playPunctClick() {
  try {
    var ctx = getCtx();
    var osc = ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=200;
    var gn = ctx.createGain();
    gn.gain.setValueAtTime(VOL*0.55, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.04);
    osc.connect(gn); gn.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.04);
  } catch(e) {}
}
function playEnter() {
  try {
    var ctx = getCtx();
    var dur = 0.055;
    var buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*dur), ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.exp(-i/(d.length*0.25));
    var src = ctx.createBufferSource(); src.buffer = buf;
    var flt = ctx.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=800;
    var gn = ctx.createGain();
    gn.gain.setValueAtTime(VOL*1.2, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    src.connect(flt); flt.connect(gn); gn.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime+dur);
  } catch(e) {}
}
function playBackspace() {
  try {
    var ctx = getCtx();
    var dur = 0.032;
    var buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*dur), ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length, 1.4);
    var src = ctx.createBufferSource(); src.buffer = buf;
    var flt = ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=900+Math.random()*300; flt.Q.value=1.2;
    var flt2 = ctx.createBiquadFilter(); flt2.type='lowpass'; flt2.frequency.value=1800;
    var gn = ctx.createGain();
    gn.gain.setValueAtTime(VOL, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    src.connect(flt); flt.connect(flt2); flt2.connect(gn); gn.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime+dur);
  } catch(e) {}
}
function playAlert() {
  try {
    var ctx = getCtx();
    var gn = ctx.createGain(); gn.connect(ctx.destination);
    [440,330].forEach(function(freq,idx) {
      var osc = ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=freq;
      osc.connect(gn);
      var t = ctx.currentTime+idx*0.12;
      gn.gain.setValueAtTime(VOL*0.4, t);
      gn.gain.exponentialRampToValueAtTime(0.001, t+0.1);
      osc.start(t); osc.stop(t+0.1);
    });
  } catch(e) {}
}
function makeDeniedBurst(ctx, t, vol) {
  var dur = 0.07;
  var buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*dur), ctx.sampleRate);
  var d = buf.getChannelData(0);
  for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length, 1.8);
  var bs = ctx.createBufferSource(); bs.buffer = buf;
  var lo = ctx.createBiquadFilter(); lo.type='bandpass'; lo.frequency.value=320; lo.Q.value=0.9;
  var gn = ctx.createGain();
  gn.gain.setValueAtTime(vol, t); gn.gain.exponentialRampToValueAtTime(0.001, t+dur);
  bs.connect(lo); lo.connect(gn); gn.connect(ctx.destination);
  bs.start(t); bs.stop(t+dur);
  var len2 = Math.floor(ctx.sampleRate*0.008);
  var buf2 = ctx.createBuffer(1, len2, ctx.sampleRate);
  var d2 = buf2.getChannelData(0);
  for (var j = 0; j < len2; j++) d2[j] = (Math.random()*2-1)*(1-j/len2);
  var bs2 = ctx.createBufferSource(); bs2.buffer = buf2;
  var hi = ctx.createBiquadFilter(); hi.type='bandpass'; hi.frequency.value=3500; hi.Q.value=1.2;
  var gn2 = ctx.createGain();
  gn2.gain.setValueAtTime(vol*0.6, t); gn2.gain.exponentialRampToValueAtTime(0.001, t+0.008);
  bs2.connect(hi); hi.connect(gn2); gn2.connect(ctx.destination);
  bs2.start(t); bs2.stop(t+0.008);
}
function playDenied() {
  try {
    var ctx = getCtx();
    [0, 0.08, 0.18].forEach(function(delay, i) {
      makeDeniedBurst(ctx, ctx.currentTime+delay, VOL*[0.9,0.35,0.12][i]);
    });
  } catch(e) {}
}
function playLineStatic() {
  try {
    var ctx = getCtx();
    var dur = 0.035;
    var buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*dur), ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
    var src = ctx.createBufferSource(); src.buffer = buf;
    var flt = ctx.createBiquadFilter(); flt.type='highpass'; flt.frequency.value=2000;
    var gn = ctx.createGain();
    gn.gain.setValueAtTime(VOL*0.75, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    src.connect(flt); flt.connect(gn); gn.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime+dur);
  } catch(e) {}
}
function playThinkHum(ms) {
  try {
    var ctx = getCtx();
    var dur = Math.min(ms/1000, 1.2);
    if (dur < 0.1) return;
    var osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value=110;
    var gn = ctx.createGain();
    gn.gain.setValueAtTime(0, ctx.currentTime);
    gn.gain.linearRampToValueAtTime(VOL*0.12, ctx.currentTime+0.08);
    gn.gain.setValueAtTime(VOL*0.12, ctx.currentTime+dur-0.08);
    gn.gain.linearRampToValueAtTime(0, ctx.currentTime+dur);
    osc.connect(gn); gn.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+dur);
  } catch(e) {}
}
function playEggTone() {
  try {
    var ctx = getCtx();
    [660,880].forEach(function(f,i) {
      var osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value=f;
      var gn = ctx.createGain();
      var t = ctx.currentTime+i*0.09;
      gn.gain.setValueAtTime(VOL*0.25, t);
      gn.gain.exponentialRampToValueAtTime(0.001, t+0.08);
      osc.connect(gn); gn.connect(ctx.destination);
      osc.start(t); osc.stop(t+0.08);
    });
  } catch(e) {}
}

// ── ENGINE ────────────────────────────────────────────────────────────────────
var output       = document.getElementById('t-output');
var inputRow     = document.getElementById('t-input-row');
var termInput    = document.getElementById('t-field');
var typing       = false;
var typingAbort  = false;
var isResponding = false;
var deniedIdx    = 0;
var inputCount   = 0;
var cursorEl     = null;
var DESTRUCT_AT  = 50;
var SLOW_WORDS   = ['CREATURE','HELP','ALIVE','DANGER','ESCAPE','WHAT IS IT'];
var inputSlowed  = false;

function setActiveCursor(el) {
  if (cursorEl) cursorEl.classList.remove('t-cursor');
  cursorEl = el;
  if (el) el.classList.add('t-cursor');
}
function sleep(ms) { return new Promise(function(r){ setTimeout(r,ms); }); }
function addLine(cls) {
  var el = document.createElement('div');
  el.className = 't-line ' + cls;
  output.appendChild(el);
  output.scrollTop = output.scrollHeight;
  return el;
}
async function typeLine(el, text, isAlert) {
  if (isAlert) { await sleep(38*4); playAlert(); }
  var slowed = inputSlowed || SLOW_WORDS.some(function(w){ return text.toUpperCase().indexOf(w) >= 0; });
  for (var i = 0; i < text.length; i++) {
    if (typingAbort) return;
    el.textContent += text[i];
    if (text[i] !== ' ' && text[i] !== '\u2500') playClick(text[i]);
    output.scrollTop = output.scrollHeight;
    await sleep((slowed ? 38*2.8 : 38) * (0.7 + Math.random()*0.6));
  }
}
async function runScript() {
  typing = true; typingAbort = false;
  output.innerHTML = ''; inputRow.style.display = 'none'; cursorEl = null;
  await sleep(800);
  var lastEl = null;
  for (var i = 0; i < SCRIPT.length; i++) {
    if (typingAbort) break;
    var line = SCRIPT[i];
    var el = addLine(line.cls);
    if (line.text) { playLineStatic(); await typeLine(el, line.text, line.alert||false); }
    var pauseMs = 280 * (line.pause||1);
    playThinkHum(pauseMs);
    await sleep(pauseMs);
    lastEl = el;
  }
  if (!typingAbort) {
    setActiveCursor(lastEl);
    await sleep(400);
    inputRow.style.display = 'flex';
    termInput.focus();
  }
  typing = false;
}
async function runSelfDestruct() {
  isResponding = true; termInput.disabled = true;
  var seq = [
    {t:'> SELF DESTRUCT SEQUENCE INITIATED',cls:'warn'},{t:'> T-MINUS 5',cls:'warn'},
    {t:'> T-MINUS 4',cls:'warn'},{t:'> T-MINUS 3',cls:'warn'},
    {t:'> T-MINUS 2',cls:'warn'},{t:'> T-MINUS 1',cls:'warn'},
    {t:'> . . .',cls:'dim'},{t:'',cls:'blank'},
    {t:"> YOU'RE STILL HERE?",cls:'full'},{t:'> PLEASE GO AWAY',cls:'dim'},{t:'',cls:'blank'}
  ];
  playAlert();
  for (var i = 0; i < seq.length; i++) {
    await sleep(280*(seq[i].t.indexOf('T-MINUS')>=0?0.9:0.5));
    var el = addLine(seq[i].cls);
    if (seq[i].t) await typeLine(el, seq[i].t, false);
  }
  var pl = addLine('lo'); await typeLine(pl, '> AWAITING INPUT', false);
  setActiveCursor(pl);
  isResponding = false; termInput.disabled = false; termInput.focus();
}

termInput.addEventListener('keydown', async function(e) {
  if (e.key === 'Enter') {
    if (isResponding) return;
    playEnter();
    var val = termInput.value.trim().toUpperCase();
    termInput.value = '';
    inputCount++;
    lastInput = Date.now();

    // Navigation
    if (val === '[HOME]' || val === '[EXIT]' || val === '[INDEX]') {
      isResponding = true;
      var n1 = addLine('dim'); await typeLine(n1, '> NAVIGATION REQUEST ACCEPTED'); await sleep(300);
      var n2 = addLine('full'); await typeLine(n2, '> REDIRECTING TO MAIN INDEX...');
      await sleep(900); window.location.href = 'index.html'; return;
    }
    // Knock knock
    if (/^KNOCK\s*KNOCK$/.test(val)) {
      var kk = addLine('dim'); await typeLine(kk, "> WHO'S THERE?");
      var kk2 = addLine('lo'); await typeLine(kk2, '> AWAITING INPUT');
      setActiveCursor(kk2);
      output.scrollTop = output.scrollHeight; termInput.focus(); return;
    }
    // Self destruct
    if (inputCount === DESTRUCT_AT) { await runSelfDestruct(); return; }

    inputSlowed = SLOW_WORDS.some(function(w){ return val.includes(w); });
    isResponding = true;
    var uLine = addLine('user');
    uLine.textContent = '> ' + (val || ' ');
    await sleep(120);

    var egg = checkEasterEgg(val);
    if (egg) {
      playEggTone();
      await sleep(320);
      var v = pickVariant(egg);
      for (var ei = 0; ei < v.lines.length; ei++) {
        var eel = addLine(v.cls[ei] || 'dim');
        await typeLine(eel, v.lines[ei], false);
        await sleep(280*0.8);
      }
    } else {
      var resp = DENIED[deniedIdx % DENIED.length]; deniedIdx++;
      playDenied();
      if (Math.random() < 0.05) {
        output.style.opacity='0.4'; output.style.letterSpacing='0.12em';
        setTimeout(function(){ output.style.opacity=''; output.style.letterSpacing=''; }, 120);
      }
      for (var ri = 0; ri < resp.length; ri++) {
        if (!resp[ri]) continue;
        playThinkHum(200); await sleep(200);
        var isBad = resp[ri].indexOf('COMMAND')>=0||resp[ri].indexOf('ERROR')>=0||resp[ri].indexOf('WARNING')>=0;
        var rel = addLine(isBad?'denied':'dim');
        await typeLine(rel, resp[ri], false);
        await sleep(280*0.6);
      }
    }

    var pLine = addLine('lo'); await typeLine(pLine, '> AWAITING INPUT', false);
    setActiveCursor(pLine);
    inputSlowed = false;
    isResponding = false;
    output.scrollTop = output.scrollHeight;
    termInput.focus();

  } else if (e.key === 'Backspace') {
    playBackspace(); lastInput = Date.now();
  } else {
    playClick(e.key); lastInput = Date.now();
  }
});

// ── FAVICON ANIMATION ─────────────────────────────────────────────────────────
(function() {
  var fav = document.querySelector('link[rel="icon"]');
  if (!fav) return;
  var DUR=5000, STAG=1000;
  function ease(t) {
    if(t<0.40)return 1.0; if(t<0.50)return 1.0-0.6*((t-0.40)/0.10);
    if(t<0.60)return 0.4+0.6*((t-0.50)/0.10); return 1.0;
  }
  function op(offset){ return ease(((Date.now()-offset)%DUR)/DUR); }
  function svg() {
    var o=[op(0),op(STAG),op(STAG*2)];
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">'
      +'<g opacity="'+o[0].toFixed(3)+'"><rect x="-1" y="4" width="8" height="22" rx="2" fill="#E8732A" opacity="0.6"/><rect x="0" y="5" width="6" height="20" rx="1" fill="#E8732A"/></g>'
      +'<g opacity="'+o[1].toFixed(3)+'"><rect x="11" y="-1" width="8" height="32" rx="2" fill="#E8732A" opacity="0.6"/><rect x="12" y="0" width="6" height="30" rx="1" fill="#E8732A"/></g>'
      +'<g opacity="'+o[2].toFixed(3)+'"><rect x="23" y="5" width="8" height="20" rx="2" fill="#E8732A" opacity="0.6"/><rect x="24" y="6" width="6" height="18" rx="1" fill="#E8732A"/></g>'
      +'</svg>';
  }
  setInterval(function(){ try{ fav.href='data:image/svg+xml;base64,'+btoa(svg()); }catch(e2){} }, 50);
})();

// ── IRIDESCENT + WINDOW PARALLAX ─────────────────────────────────────────────
(function() {
  var iri  = document.getElementById('iridescent');
  var tbox = document.getElementById('terminal-box');
  if (!iri) return;
  var px=0, py=0, tx=0, ty=0;
  document.addEventListener('mousemove', function(e) {
    var nx=(e.clientX/window.innerWidth-0.5)*2;
    var ny=(e.clientY/window.innerHeight-0.5)*2;
    tx=nx; ty=ny;
    // Iridescent: hue + focal-point shift
    var hue=Math.round((nx+1)*180);
    var fcx=Math.round(50+nx*22);
    var fcy=Math.round(50+ny*22);
    var mag=(Math.abs(nx)+Math.abs(ny))*0.5;
    iri.style.background='conic-gradient(from '+hue+'deg at '+fcx+'% '+fcy+'%,rgba(255,0,60,0.75),rgba(232,115,42,0.65),rgba(0,255,0,0.55),rgba(0,234,255,0.65),rgba(255,0,60,0.75))';
    iri.style.opacity=(0.03+mag*0.06).toFixed(3);
  });
  (function lerp(){
    px+=(tx-px)*0.05; py+=(ty-py)*0.05;
    // Iridescent layer drifts with cursor
    iri.style.transform='translate('+(px*18).toFixed(2)+'px,'+(py*12).toFixed(2)+'px)';
    // Terminal window floats counter to cursor (parallax)
    if (tbox) {
      tbox.style.transform='translate('+(-px*8).toFixed(2)+'px,'+(-py*5).toFixed(2)+'px)';
    }
    requestAnimationFrame(lerp);
  })();
})();

// ── MOBILE KEYBOARD FIX ────────────────────────────────────────────────────────
(function() {
  function fixHeight() {
    var pg = document.getElementById('page');
    if (pg) pg.style.height = window.innerHeight + 'px';
  }
  window.addEventListener('resize', fixHeight);
  fixHeight();
})();

// ── START ─────────────────────────────────────────────────────────────────────
runScript();
